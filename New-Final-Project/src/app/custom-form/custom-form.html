<!-- Logan: template for the add custom restaurant form -->

<div class="container-fluid" style="padding-top:0;">
  <div class="row">
    <div class="col-sm-8 col-sm-offset-2">
      <div class="panel panel-default">
        <div class="panel-heading text-center"><h3>Add Your Own Restaurant</h3></div>
        <div class="panel-body" style="text-align:left; padding:30px;">

          <form (ngSubmit)="onSaveCustom()" #customForm="ngForm" novalidate>

            <!-- Will: custom restaurant fields -->
            <!-- name, cuisine, priceRange, rating (1 to 5), location, address all required -->
            <!-- phone and description are optional -->

            <div class="form-group">
              <label for="cName">Restaurant Name (Required)</label>
              <input type="text" class="form-control" id="cName" name="cName" [(ngModel)]="cName">
              <div class="error">{{ cNameError }}</div>
            </div>

            <div class="form-group">
              <label for="cCuisine">Cuisine (Required)</label>
              <select class="form-control" id="cCuisine" name="cCuisine" [(ngModel)]="cCuisine">
                <option value="">Select a Cuisine</option>
                @for (c of cuisines; track c) {
                  <option [value]="c">{{ c }}</option>
                }
                <option value="Other">Other</option>
              </select>
              <div class="error">{{ cCuisineError }}</div>
            </div>

            <div class="form-group">
              <label for="cPrice">Price Range (Required)</label>
              <select class="form-control" id="cPrice" name="cPrice" [(ngModel)]="cPrice">
                <option value="">Select a Price Range</option>
                <option value="$">$</option>
                <option value="$$">$$</option>
                <option value="$$$">$$$</option>
                <option value="$$$$">$$$$</option>
              </select>
              <div class="error">{{ cPriceError }}</div>
            </div>

            <div class="form-group">
              <label for="cRating">Rating from 1 to 5 (Required)</label>
              <input type="number" class="form-control" id="cRating" name="cRating"
                     min="1" max="5" step="0.1" [(ngModel)]="cRating">
              <div class="error">{{ cRatingError }}</div>
            </div>

            <div class="form-group">
              <label for="cLocation">Location or Neighborhood (Required)</label>
              <input type="text" class="form-control" id="cLocation" name="cLocation" [(ngModel)]="cLocation">
              <div class="error">{{ cLocationError }}</div>
            </div>

            <div class="form-group">
              <label for="cAddress">Address (Required)</label>
              <input type="text" class="form-control" id="cAddress" name="cAddress" [(ngModel)]="cAddress">
              <div class="error">{{ cAddressError }}</div>
            </div>

            <div class="form-group">
              <label for="cPhone">Phone (Optional)</label>
              <input type="text" class="form-control" id="cPhone" name="cPhone" [(ngModel)]="cPhone">
            </div>

            <div class="form-group">
              <label for="cDescription">Description (Optional)</label>
              <textarea class="form-control" id="cDescription" name="cDescription"
                        rows="3" [(ngModel)]="cDescription"></textarea>
            </div>

            <button type="submit" class="btn btn-primary-flat btn-block">SAVE RESTAURANT</button>

          </form>

          @if (customMessage) {
            <div [class]="customAlertClass" style="margin-top:15px;">{{ customMessage }}</div>
          }

        </div>
      </div>
    </div>
  </div>
</div>
